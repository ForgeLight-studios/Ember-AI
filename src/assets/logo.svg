<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#F7931E" />
    </linearGradient>
  </defs>

  <!-- Local Network Lines -->
  <line x1="40" y1="135" x2="160" y2="135" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />
  <line x1="100" y1="135" x2="100" y2="175" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />

  <!-- Network Nodes -->
  <circle cx="70" cy="135" r="5" fill="#64748B" />
  <circle cx="130" cy="135" r="5" fill="#64748B" />
  <circle cx="100" cy="165" r="5" fill="#64748B" />

  <!-- Rounded Geometric AI Node -->
  <g transform="translate(100, 75)">
    <!-- Main Body (Rounded added back) -->
    <rect x="-35" y="-40" width="70" height="70" rx="20" fill="url(#modernGrad)" />

    <!-- "Antenna" / Ears (Rounded added back) -->
    <rect x="-45" y="-30" width="15" height="12" rx="4" fill="#FF9A44" />
    <rect x="30" y="-30" width="15" height="12" rx="4" fill="#FF9A44" />

    <!-- Center "AI" Cutout (Rounded added back) -->
    <rect x="-10" y="-25" width="20" height="35" rx="10" fill="#FFFFFF" />

    <!-- Inner Dot -->
    <circle cx="0" cy="-8" r="4" fill="#FF6B35" />

    <!-- Side Glowing Nodes -->
    <circle cx="-22" cy="5" r="4" fill="#FFFFFF" />
    <circle cx="22" cy="5" r="4" fill="#FFFFFF" />
  </g>
</svg>